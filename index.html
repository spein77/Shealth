<script>

const SUPABASE_URL = "https://brudwajyxwmypukfbsit.supabase.co";
const SUPABASE_KEY = "sb_publishable_Xe9St-PW-8IWljKlR4Mcpg_RsHGkDlP";

const client =
supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentUserEmail = "";

let latestAIText = "";
let isPremium = false;
let dailyChecks = 0;

let deferredPrompt;

window.addEventListener('beforeinstallprompt',(e)=>{

e.preventDefault();

deferredPrompt = e;

document.getElementById('installBtn')
.style.display = "inline-block";

});

document.getElementById('installBtn')
.addEventListener('click',async()=>{

if(deferredPrompt){

deferredPrompt.prompt();

}

});

setTimeout(()=>{

document.getElementById('splash')
.style.display = "none";

},3000);

function togglePassword(){

const password =
document.getElementById('password');

if(password.type === "password"){

password.type = "text";

}else{

password.type = "password";

}

}

async function registerUser(){

const email =
document.getElementById('email').value;

const password =
document.getElementById('password').value;

const { error } =
await client.auth.signUp({
email,
password
});

if(error){

document.getElementById('message')
.innerHTML = error.message;

return;

}

document.getElementById('message')
.style.color = "green";

document.getElementById('message')
.innerHTML = "Account created successfully";

}

async function loginUser(){

const email =
document.getElementById('email').value;

const password =
document.getElementById('password').value;

const { data,error } =
await client.auth.signInWithPassword({
email,
password
});

if(error){

document.getElementById('message')
.innerHTML = error.message;

return;

}

currentUserEmail = data.user.email;
const { data: premiumData } = await client
.from('subscriptions')
.select('*')
.eq('user_id', data.user.id)
.single();

if(premiumData && premiumData.premium === true){
   isPremium = true;
}
if(isPremium){
   document.getElementById("premiumStatus").innerHTML =
   "👑 PREMIUM ACTIVE";
}else{
   document.getElementById("premiumStatus").innerHTML =
   "🆓 FREE ACCOUNT";
}
if(isPremium){
   document.getElementById("adBox").style.display = "none";
}
if(isPremium){
   document.getElementById("appTitle").innerHTML =
   "🩺 AI MEDICAL ASSISTANT 👑 PREMIUM";
}

document.getElementById('authBox')
.classList.add('hidden');

document.getElementById('checkerBox')
.classList.remove('hidden');

loadHistory();
loadPaymentMessage(data.user.id);

}

async function checkDisease(){
  if(!isPremium && dailyChecks >= 3){
   alert("⭐ Free version inaruhusu uchunguzi 3 tu. Upgrade to Premium kupata unlimited checks.");
   return;
}

dailyChecks++;

document.getElementById('loader')
.style.display = "block";

document.getElementById('aiResponse')
.innerHTML = "";

const symptomsText =
document.getElementById('userSymptoms')
.value.toLowerCase();

const userSymptoms =
symptomsText.split(',')
.map(s=>s.trim());

const { data,error } =
await client
.from('diseases')
.select('*');

if(error){

document.getElementById('loader')
.style.display = "none";

return;

}

let bestMatch = null;

let highestScore = 0;

data.forEach(disease=>{

const diseaseName =
disease.disease.toLowerCase();

const diseaseSymptoms =
disease.symptoms.toLowerCase()
.split(',')
.map(s=>s.trim());

let score = 0;

userSymptoms.forEach(symptom=>{

if(diseaseSymptoms.includes(symptom)){
score++;
}

if(diseaseName.includes(symptom)){
score += 2;
}

});

if(score > highestScore){

highestScore = score;
bestMatch = disease;

}

});

setTimeout(async()=>{

document.getElementById('loader')
.style.display = "none";

const resultDiv =
document.getElementById('result');

const aiDiv =
document.getElementById('aiResponse');

if(bestMatch){

resultDiv.innerHTML = `

<div class="result">

<h1>${bestMatch.disease}</h1>

<p>
<b>Dalili:</b><br><br>
${bestMatch.symptoms}
</p>

<p>
<b>Ushauri:</b><br><br>
${bestMatch.advice}
</p>

</div>

`;

const aiText = `🤖 AI MEDICAL ANALYSIS

Kutokana na dalili ulizoandika,
inaonekana unaweza kuwa na:

${bestMatch.disease}

Dalili zako zinafanana na:
${bestMatch.symptoms}

⚠️ Huu sio uchunguzi kamili wa hospitali.

✅ Ushauri:
${bestMatch.advice}

🏥 Tafadhali nenda hospitali kwa vipimo zaidi.
`;

latestAIText = aiText;

aiDiv.innerHTML = `

<div class="ai-box">

<h2>🤖 AI Medical Assistant</h2>

<p class="typing"
id="typingText"></p>

</div>

`;

typeWriter(aiText,"typingText",20);

await client
.from('history')
.insert([
{
email:currentUserEmail,
symptoms:symptomsText,
result:bestMatch.disease
}
]);

loadHistory();

}else{

resultDiv.innerHTML = `

<div class="result">

<h2>No Disease Found</h2>

<p>
Try better symptoms.
</p>

</div>

`;

}

},2000);

}

function typeWriter(text,id,speed){

let i = 0;

const element =
document.getElementById(id);

function typing(){

if(i < text.length){

element.innerHTML += text.charAt(i);

i++;

setTimeout(typing,speed);

}

}

typing();

}

function speakResult(){

if(!isPremium){
alert("⭐ Voice AI ni huduma ya Premium. Lipa Tsh 5,000 kufungua huduma hii.");
return;
}

if(latestAIText === ""){
alert("No AI result available");
return;
}

const speech =
new SpeechSynthesisUtterance(latestAIText);

speech.lang = "sw-TZ";
speech.rate = 0.9;
speech.pitch = 1;
speech.volume = 1;

window.speechSynthesis.speak(speech);

}

async function loadHistory(){

const { data,error } =
await client
.from('history')
.select('*')
.eq('email',currentUserEmail)
.order('id',{ascending:false});

if(error){
return;
}

const historyDiv =
document.getElementById('history');

historyDiv.innerHTML = "";

data.forEach(item=>{

historyDiv.innerHTML += `

<div class="history-card">

<h3>${item.result}</h3>

<p>
<b>Symptoms:</b><br>
${item.symptoms}
</p>

</div>

`;

});

}
async function deleteHistory(){

const confirmDelete =
confirm("Una uhakika unataka kufuta history yote?");

if(!confirmDelete){
return;
}

const { error } = await client
.from('history')
.delete()
.eq('email', currentUserEmail);

if(error){
alert(error.message);
return;
}

document.getElementById('history').innerHTML = "";

alert("History yote imefutwa.");

}
async function downloadPDF(){

if(!isPremium){
   alert("⭐ PDF Reports ni huduma ya Premium.");
   return;
}

if(latestAIText === ""){
   alert("Hakuna report ya kupakua.");
   return;
}

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

doc.setFontSize(16);
doc.text("AI Medical Report", 20, 20);

const lines = doc.splitTextToSize(latestAIText, 170);

doc.setFontSize(12);
doc.text(lines, 20, 40);

doc.save("Medical_Report.pdf");

}
async function loadPaymentMessage(userId){

const { data,error } = await client
.from("payment_requests")
.select("admin_message,message_sent")
.eq("user_id", userId)
.eq("message_sent", true)
.order("id",{ascending:false})
.limit(1);

if(error || !data || data.length === 0){
return;
}

document.getElementById("paymentNotice").innerHTML = `
<div style="
background:#fee2e2;
color:#b91c1c;
padding:15px;
margin-top:15px;
border-radius:12px;
font-weight:bold;
text-align:center;
">
${data[0].admin_message}
</div>
`;

}

async function logoutUser(){

await client.auth.signOut();

location.reload();

}

if('serviceWorker' in navigator){

navigator.serviceWorker.register('service-worker.js');

}
async function upgradePremium(){

if(!currentUserEmail){
  alert("Login first");
  return;
}

const proceed = confirm(`⭐ PREMIUM MEMBERSHIP

✅ Unlimited AI Consultation
✅ Voice Medical Assistant
✅ Medicine Recommendations
✅ Disease Risk Prediction
✅ PDF Medical Reports
✅ No Ads

💰 Tsh 2,000 / Month

Mix by Yas:
0656591574

Ukishalipa bonyeza OK kutuma Transaction ID`);

if(proceed){
   submitPayment();
}

}

async function submitPayment(){

const {
 data:{user}
} = await client.auth.getUser();

if(!user){
 alert("Login first");
 return;

}

const tx = prompt("Weka Transaction ID");

if(!tx){
 return;
}

if(!/^\d{14}$/.test(tx.trim())){
   alert("❌ Transaction ID si sahihi. Ingiza Transaction ID yenye tarakimu 14.");
   return;
}

const { error } = await client
.from("payment_requests")
.insert([{
   user_id:user.id,
   full_name:currentUserEmail,
   transaction_id:tx,
   amount:"2000"
 }]);

if(error){
 alert(error.message);
 return;
}

alert("✅ Payment request submitted successfully.");

}





</script>
